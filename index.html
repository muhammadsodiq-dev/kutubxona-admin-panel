<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LibraryMS — Kutubxona tizimi</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans','Segoe UI',sans-serif;background:#F1F5F9;color:#0F172A;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:8px}

/* ══════════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════════ */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popUp{from{opacity:0;transform:scale(.94) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ══════════════════════════════════════════
   LOGIN PAGE
══════════════════════════════════════════ */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0F172A 0%,#1E3A5F 100%);padding:16px}
.login-box{background:#fff;border-radius:24px;width:100%;max-width:420px;padding:40px 36px;box-shadow:0 40px 100px rgba(0,0,0,.4);animation:popUp .3s ease}
.login-logo{width:58px;height:58px;border-radius:18px;background:#3B82F6;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:0 8px 24px rgba(59,130,246,.5)}
.login-logo svg{width:28px;height:28px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.login-title{text-align:center;font-size:24px;font-weight:800;margin-bottom:5px}
.login-sub{text-align:center;color:#64748B;font-size:14px;margin-bottom:28px}

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
#app{display:none;min-height:100vh}
#app.active{display:flex}

/* SIDEBAR */
.sidebar{width:240px;background:#0F172A;height:100vh;position:fixed;left:0;top:0;display:flex;flex-direction:column;z-index:300;transition:transform .28s cubic-bezier(.4,0,.2,1)}
.sidebar-brand{padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:11px;flex-shrink:0}
.brand-icon{width:36px;height:36px;border-radius:10px;background:#3B82F6;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(59,130,246,.6)}
.brand-icon svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.brand-name{color:#fff;font-weight:800;font-size:14px}
.brand-sub{color:rgba(255,255,255,.35);font-size:11px}
.sidebar-nav{flex:1;padding:14px 10px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:1.3px;text-transform:uppercase;margin-bottom:10px;padding-left:10px}
.nav-item{width:100%;display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;border:none;background:transparent;color:rgba(255,255,255,.52);cursor:pointer;margin-bottom:3px;font-weight:500;font-size:14px;text-align:left;transition:all .15s;font-family:inherit}
.nav-item:hover{background:rgba(255,255,255,.08)}
.nav-item.active{background:#2563EB;color:#fff;font-weight:700}
.nav-item .nav-dot{margin-left:auto;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.8);display:none}
.nav-item.active .nav-dot{display:block}
.nav-item svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.nav-item.active svg{stroke-width:2.2}
.sidebar-profile{padding:14px 10px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
.profile-info{display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:4px}
.profile-avatar{width:32px;height:32px;border-radius:9px;background:#F59E0B;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.profile-name{color:#fff;font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.profile-email{color:rgba(255,255,255,.33);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;border:none;background:transparent;color:rgba(255,255,255,.42);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;transition:background .15s}
.logout-btn:hover{background:rgba(255,255,255,.07)}
.logout-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* MAIN WRAP */
.main-wrap{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}

/* HEADER */
.top-header{background:#fff;height:60px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #E2E8F0;position:sticky;top:0;z-index:200;box-shadow:0 1px 6px rgba(0,0,0,.05);flex-shrink:0}
.header-left{display:flex;align-items:center;gap:13px}
.page-title{font-size:18px;font-weight:800}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px;color:#0F172A}
.hamburger svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.header-right{display:flex;align-items:center;gap:10px}
.notif-btn{background:#F1F5F9;border:none;border-radius:10px;padding:9px;cursor:pointer;position:relative;display:flex}
.notif-btn svg{width:17px;height:17px;fill:none;stroke:#64748B;stroke-width:2;stroke-linecap:round}
.notif-badge{position:absolute;top:6px;right:6px;min-width:16px;height:16px;background:#EF4444;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;border:1.5px solid #fff;padding:0 3px;display:none}
.notif-badge.show{display:flex}
.header-avatar{width:34px;height:34px;border-radius:10px;background:#F59E0B;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff}

/* PAGE CONTENT */
.page-content{padding:24px;flex:1;animation:fadeIn .2s ease}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:299}
.overlay.show{display:block}

/* ══════════════════════════════════════════
   COMPONENTS
══════════════════════════════════════════ */

/* Form elements */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;color:#0F172A;outline:none;box-sizing:border-box;font-family:inherit;transition:border-color .15s,box-shadow .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.field textarea{resize:vertical;min-height:78px}
.field select{cursor:pointer;background:#fff}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;transition:filter .15s,transform .1s;font-family:inherit;padding:10px 18px;flex-shrink:0}
.btn:hover{filter:brightness(.91);transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;filter:none}
.btn-primary{background:#3B82F6;color:#fff}
.btn-danger{background:#EF4444;color:#fff}
.btn-success{background:#10B981;color:#fff}
.btn-ghost{background:#F1F5F9;color:#0F172A}
.btn-sm{padding:6px 12px;font-size:12px}
.btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-sm svg{width:13px;height:13px}

/* Stat Cards */
.stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.stat-card{background:#fff;border-radius:16px;padding:18px 20px;box-shadow:0 1px 8px rgba(0,0,0,.07);display:flex;align-items:center;gap:16px;flex:1;min-width:155px}
.stat-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-icon svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.stat-label{font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.stat-value{font-size:26px;font-weight:800;line-height:1}

/* Table */
.table-wrap{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.07)}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #E2E8F0;background:#F8FAFC;white-space:nowrap}
tbody tr{border-bottom:1px solid #E2E8F0;transition:background .1s;cursor:default}
tbody tr:nth-child(even){background:#FAFBFC}
tbody tr:hover{background:#EFF6FF}
tbody td{padding:12px 14px;font-size:14px;color:#64748B;vertical-align:middle}
td.bold{font-weight:700;color:#0F172A}
td.sm{font-size:12px}
td.danger-text{color:#EF4444;font-weight:700}
.empty-row td{padding:40px;text-align:center;color:#64748B}

/* Badge */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}

/* Action buttons */
.act-btn{display:inline-flex;border:none;border-radius:7px;padding:6px 9px;cursor:pointer;transition:filter .15s}
.act-btn:hover{filter:brightness(.9)}
.act-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.act-blue{background:#EFF6FF;color:#3B82F6}
.act-green{background:#F0FDF4;color:#10B981}
.act-red{background:#FEF2F2;color:#EF4444}

/* Toolbar */
.toolbar{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-wrap{flex:1;position:relative;min-width:180px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;fill:none;stroke:#64748B;stroke-width:2;stroke-linecap:round;pointer-events:none}
.search-wrap input{width:100%;padding:9px 12px 9px 36px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;box-sizing:border-box;background:#fff;font-family:inherit}
.search-wrap input:focus{border-color:#3B82F6}
.filter-select{padding:9px 12px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;background:#fff;cursor:pointer;font-family:inherit}
.count-label{font-size:13px;color:#64748B;margin-bottom:12px}
.count-label b{color:#0F172A}

/* Pagination */
.pagination{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:18px}
.pagination span{font-size:13px;color:#64748B;font-weight:600;min-width:80px;text-align:center}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);align-items:center;justify-content:center;z-index:500;padding:16px}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:20px;width:100%;max-width:500px;padding:26px 26px 22px;box-shadow:0 28px 80px rgba(0,0,0,.22);animation:popUp .22s cubic-bezier(.22,.68,0,1.2);max-height:92vh;overflow-y:auto}
.modal-box.wide{max-width:680px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-head h2{font-size:17px;font-weight:800}
.modal-close{background:#F1F5F9;border:none;border-radius:9px;padding:6px 7px;cursor:pointer;display:flex}
.modal-close svg{width:16px;height:16px;fill:none;stroke:#64748B;stroke-width:2;stroke-linecap:round}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:12px}

/* Error box */
.err-box{background:#FEE2E2;color:#991B1B;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;font-weight:600;display:none}
.err-box.show{display:block}

/* Spinner */
.spinner-wrap{display:flex;justify-content:center;padding:48px}
.spinner{width:32px;height:32px;border:3px solid #E2E8F0;border-top-color:#3B82F6;border-radius:50%;animation:spin .7s linear infinite}

/* Grid for forms */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}

/* Dashboard grid */
.dash-grid{display:grid;grid-template-columns:1.7fr 1fr;gap:16px;margin-top:18px}
.dash-card{background:#fff;border-radius:16px;padding:22px 24px;box-shadow:0 1px 8px rgba(0,0,0,.07)}
.dash-card h3{font-size:15px;font-weight:800;margin-bottom:18px}
.today-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #E2E8F0}
.today-row span:first-child{font-size:13px;color:#64748B}
.today-row .val{font-size:18px;font-weight:800}
.reader-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #E2E8F0}
.reader-row:last-child{border-bottom:none}
.reader-rank{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.reader-name{flex:1;font-size:13px;font-weight:600;color:#0F172A}
.reader-count{font-size:13px;font-weight:800;color:#3B82F6}

/* Bar chart (CSS only for demo) */
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:200px;padding:0 4px}
.chart-bar-wrap{display:flex;flex-direction:column;align-items:center;flex:1;gap:6px}
.chart-bar{width:100%;background:#3B82F6;border-radius:6px 6px 0 0;transition:height .3s}
.chart-label{font-size:11px;color:#64748B;font-weight:600;text-align:center}

/* Category cards */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px}
.cat-card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 1px 8px rgba(0,0,0,.07);transition:box-shadow .15s}
.cat-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1)}
.cat-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cat-name{font-weight:800;font-size:15px}
.cat-desc{font-size:13px;color:#64748B;line-height:1.5}
.cat-actions{display:flex;gap:5px}

/* Copies modal */
.copies-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;padding:10px 14px;background:#F1F5F9;border-radius:10px}
.copies-toolbar span{font-size:13px;color:#64748B}
.copies-toolbar input{width:70px;padding:7px 10px;border:1.5px solid #E2E8F0;border-radius:9px;font-size:14px;outline:none;text-align:center;font-family:inherit}
.copies-count{margin-left:auto;font-size:12px;color:#64748B}

/* Users avatar */
.user-ava{width:32px;height:32px;border-radius:9px;background:rgba(59,130,246,.15);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#3B82F6;flex-shrink:0}

/* Info box */
.info-box{background:#F1F5F9;padding:8px 12px;border-radius:8px;font-size:12px;color:#64748B;margin-bottom:14px}

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media(max-width:1000px){.dash-grid{grid-template-columns:1fr}}
@media(max-width:768px){
  .sidebar{transform:translateX(-240px)}
  .sidebar.mob-open{transform:translateX(0)}
  .overlay{display:none}
  .overlay.show{display:block}
  .main-wrap{margin-left:0}
  .hamburger{display:flex}
  .stats-row>*{min-width:145px}
  .form-grid{grid-template-columns:1fr}
}
@media(max-width:520px){
  .stats-row{display:grid;grid-template-columns:1fr 1fr}
  .page-content{padding:14px}
  .top-header{padding:0 14px}
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     LOGIN PAGE
══════════════════════════════════════════ -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">
      <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    </div>
    <div class="login-title">LibraryMS</div>
    <div class="login-sub">Kutubxona boshqaruv tizimi</div>
    <div class="err-box" id="loginErr"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="email@mail.uz" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="field">
      <label>Parol</label>
      <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()" style="width:100%;justify-content:center;padding:13px 18px;font-size:15px;margin-top:4px">Kirish →</button>
  </div>
</div>

<!-- ══════════════════════════════════════════
     MAIN APP
══════════════════════════════════════════ -->
<div id="app">
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      </div>
      <div><div class="brand-name">LibraryMS</div><div class="brand-sub">Kutubxona tizimi</div></div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">Asosiy menyu</div>
      <button class="nav-item active" onclick="goto('dashboard')" data-page="dashboard">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard<span class="nav-dot"></span>
      </button>
      <button class="nav-item" onclick="goto('books')" data-page="books">
        <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Kitoblar<span class="nav-dot"></span>
      </button>
      <button class="nav-item" onclick="goto('authors')" data-page="authors">
        <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Mualliflar<span class="nav-dot"></span>
      </button>
      <button class="nav-item" onclick="goto('categories')" data-page="categories">
        <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        Kategoriyalar<span class="nav-dot"></span>
      </button>
      <button class="nav-item" onclick="goto('borrows')" data-page="borrows">
        <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Ijaralar<span class="nav-dot"></span>
      </button>
      <button class="nav-item" onclick="goto('users')" data-page="users">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Foydalanuvchilar<span class="nav-dot"></span>
      </button>
    </nav>

    <div class="sidebar-profile">
      <div class="profile-info">
        <div class="profile-avatar" id="sideAvatar">A</div>
        <div><div class="profile-name" id="sidebarName">Admin</div><div class="profile-email" id="sidebarEmail">admin@library.uz</div></div>
      </div>
      <button class="logout-btn" onclick="doLogout()">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Chiqish
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-wrap">
    <header class="top-header">
      <div class="header-left">
        <button class="hamburger" onclick="toggleSidebar()">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

══════════════════════════════════════════ -->

<script>
// ══════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════
const BASE = "http://46.224.172.209:8080";
let TOKEN = null;
let currentPage = "dashboard";
let paginationState = {};

// ══════════════════════════════════════════
//  API HELPER
// ══════════════════════════════════════════
async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      "Content-Type": "application/json",
      ...(TOKEN ? { Authorization: `Bearer ${TOKEN}` } : {})
    }
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  const text = await r.text();
  let data;
  try { data = text ? JSON.parse(text) : null; } catch { data = text; }
  if (!r.ok) throw data || { message: `HTTP ${r.status}` };
  return data;
}

// ══════════════════════════════════════════
//  BORROW STATUS MAP
// ══════════════════════════════════════════
const BORROW_MAP = {
  RESERVED:           { bg:"#DBEAFE", c:"#1D4ED8", t:"Bron qilingan"   },
  BORROWED:           { bg:"#D1FAE5", c:"#065F46", t:"Olib ketilgan"   },
  RETURNED:           { bg:"#F0FDF4", c:"#166534", t:"Qaytarilgan"     },
  OVERDUE:            { bg:"#FEE2E2", c:"#991B1B", t:"Kechikkan ⚠️"    },
  RESERVED_CANCELLED: { bg:"#FEF3C7", c:"#92400E", t:"Bekor (bron)"    },
  FORCE_CANCELLED:    { bg:"#F5F3FF", c:"#5B21B6", t:"Majburiy bekor"  },
};

const STATUS_MAP = {
  ACTIVE:    { bg:"#D1FAE5", c:"#065F46", t:"Faol"           },
  UNVERIFIED:{ bg:"#FEF3C7", c:"#92400E", t:"Tasdiqlanmagan" },
  BLOCKED:   { bg:"#FEE2E2", c:"#991B1B", t:"Bloklangan"     },
  USER:      { bg:"#DBEAFE", c:"#1E40AF", t:"User"           },
  ADMIN:     { bg:"#F3E8FF", c:"#6B21A8", t:"Admin"          },
  SUPER_USER:{ bg:"#FFF7ED", c:"#9A3412", t:"Super User"     },
  AVAILABLE: { bg:"#D1FAE5", c:"#065F46", t:"Mavjud"         },
  LOST:      { bg:"#FEE2E2", c:"#991B1B", t:"Yo'qolgan"      },
  DAMAGED:   { bg:"#F3E8FF", c:"#6B21A8", t:"Shikastlangan"  },
};

function badge(s) {
  const m = {...BORROW_MAP,...STATUS_MAP};
  const v = m[s] || { bg:"#F1F5F9", c:"#64748B", t: s||"—" };
  return `<span class="badge" style="background:${v.bg};color:${v.c}">${v.t}</span>`;
}

// ══════════════════════════════════════════
//  LOGIN
// ══════════════════════════════════════════
async function doLogin() {
  const email = document.getElementById("loginEmail").value.trim();
  const pass  = document.getElementById("loginPass").value;
  const err   = document.getElementById("loginErr");
  const btn   = document.getElementById("loginBtn");
  if (!email || !pass) { showErr(err, "Email va parolni kiriting"); return; }
  btn.textContent = "Kirish..."; btn.disabled = true;
  try {
    const d = await api("POST", "/api/auth/login", { email, password: pass });
    TOKEN = d.token;
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("app").classList.add("active");
    loadUserInfo();
    loadNotifCount();
    goto("dashboard");
  } catch(e) {
    showErr(err, e?.message || "Login yoki parol noto'g'ri");
  }
  btn.textContent = "Kirish →"; btn.disabled = false;
}

function doLogout() {
  TOKEN = null;
  document.getElementById("app").classList.remove("active");
  document.getElementById("loginPage").style.display = "flex";
  document.getElementById("loginEmail").value = "";
  document.getElementById("loginPass").value = "";
}

async function loadUserInfo() {
  try {
    const d = await api("GET", "/api/users/me");
    const fn = d.first_name || "A";
    const init = fn[0].toUpperCase();
    document.getElementById("sideAvatar").textContent = init;
    document.getElementById("headerAvatar").textContent = init;
    document.getElementById("sidebarName").textContent = (d.first_name||"") + " " + (d.last_name||"");
    document.getElementById("sidebarEmail").textContent = d.email || "";
  } catch(e) {}
}

async function loadNotifCount() {
  try {
    const n = await api("GET", "/api/notification/unread-count");
    const b = document.getElementById("notifBadge");
    if (n > 0) { b.textContent = n > 9 ? "9+" : n; b.classList.add("show"); }
  } catch(e) {}
}

// ══════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════
const PAGE_TITLES = {
  dashboard:"Dashboard", books:"Kitoblar", authors:"Mualliflar",
  categories:"Kategoriyalar", borrows:"Ijaralar", users:"Foydalanuvchilar"
};

function goto(page) {
  currentPage = page;
  document.querySelectorAll(".nav-item").forEach(el => {
    el.classList.toggle("active", el.dataset.page === page);
  });
  document.getElementById("pageTitle").textContent = PAGE_TITLES[page] || page;
  closeSidebar();
  const pages = { dashboard:renderDashboard, books:renderBooks, authors:renderAuthors, categories:renderCategories, borrows:renderBorrows, users:renderUsers };
  if (pages[page]) pages[page]();
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("mob-open");
  document.getElementById("overlay").classList.toggle("show");
}
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("mob-open");
  document.getElementById("overlay").classList.remove("show");
}

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function showErr(el, msg) { el.textContent = "⚠️ " + msg; el.classList.add("show"); }
function hideErr(el) { el.classList.remove("show"); }
function spinner() { return `<div class="spinner-wrap"><div class="spinner"></div></div>`; }
function setContent(html) { document.getElementById("pageContent").innerHTML = html; }

function pagerHtml(page, totalPages, fn) {
  if (totalPages <= 1) return "";
  return `<div class="pagination">
    <button class="btn btn-ghost btn-sm" onclick="${fn}(${page-1})" ${page===0?"disabled":""}>
      <svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round"><polyline points="15 18 9 12 15 6"/></svg> Oldingi
    </button>
    <span>${page+1} / ${Math.max(totalPages,1)}</span>
    <button class="btn btn-ghost btn-sm" onclick="${fn}(${page+1})" ${page>=totalPages-1?"disabled":""}>
      Keyingi <svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>`;
}

// ══════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════
function openModal(title, body, wide=false) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = body;
  document.getElementById("modalBox").classList.toggle("wide", wide);
  document.getElementById("modal").classList.add("show");
}
function closeModal() { document.getElementById("modal").classList.remove("show"); }

// ══════════════════════════════════════════
//  DASHBOARD
// ══════════════════════════════════════════
async function renderDashboard() {
  setContent(`
    <div class="stats-row" id="statCards">${[
      ["Jami Kitoblar","#3B82F6"],["Kitobxonlar","#F59E0B"],["Olib ketilgan","#10B981"],
      ["Bron qilingan","#0EA5E9"],["Kechikkan","#EF4444"],["Qaytarilgan","#6366F1"]
    ].map(([l,c])=>`
      <div class="stat-card" style="border-left:4px solid ${c}">
        <div class="stat-icon" style="background:${c}18;color:${c}">
          <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </div>
        <div><div class="stat-label">${l}</div><div class="stat-value" style="color:${c}">—</div></div>
      </div>`).join("")}
    </div>
    <div class="dash-grid">
      <div class="dash-card">
        <h3>🏆 Top 5 Ko'p O'qilgan Kitob</h3>
        <div id="topBooksChart">${spinner()}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="dash-card">
          <h3 style="font-size:14px">📈 Bugungi Ko'rsatkichlar</h3>
          <div class="today-row"><span>So'nggi 24 soat</span><span class="val" id="last24" style="color:#3B82F6">—</span></div>
          <div class="today-row" style="border-bottom:none"><span>Kunlik o'rtacha</span><span class="val" id="daily" style="color:#F59E0B">—</span></div>
        </div>
        <div class="dash-card" style="flex:1">
          <h3 style="font-size:14px">🥇 Top O'quvchilar</h3>
          <div id="topReaders">${spinner()}</div>
        </div>
      </div>
    </div>
  `);

  try {
    const [allBooks,allBookers,borrowed,reserved,overdue,returned,last24h,daily,books,readers] = await Promise.all([
      api("GET","/api/dashboard/all-books"),
      api("GET","/api/dashboard/all-bookers"),
      api("GET","/api/dashboard/borrewed-books"),
      api("GET","/api/dashboard/reserved-books"),
      api("GET","/api/dashboard/overdue-books"),
      api("GET","/api/dashboard/returned-books"),
      api("GET","/api/dashboard/borrowed-books/last-24-hours"),
      api("GET","/api/dashboard/daily-average-borrowed-books"),
      api("GET","/api/dashboard/top-borrowed-books"),
      api("GET","/api/dashboard/top-readers"),
    ]);

    const vals = [allBooks,allBookers,borrowed,reserved,overdue,returned];
    document.querySelectorAll(".stat-value").forEach((el,i) => el.textContent = vals[i] ?? 0);
    document.getElementById("last24").textContent = last24h ?? 0;
    document.getElementById("daily").textContent = parseFloat(daily||0).toFixed(1);

    // Chart
    const booksArr = Array.isArray(books) ? books.slice(0,5) : [];
    const maxVal = Math.max(...booksArr.map(b=>b.borrow_count||0), 1);
    document.getElementById("topBooksChart").innerHTML = booksArr.length
      ? `<div class="chart-bars">${booksArr.map(b=>{
          const h = Math.round((b.borrow_count/maxVal)*180);
          const name = (b.title||"").length>14 ? b.title.slice(0,13)+"…" : (b.title||"");
          return `<div class="chart-bar-wrap">
            <div style="flex:1;display:flex;align-items:flex-end">
              <div class="chart-bar" style="height:${h}px;background:#3B82F6" title="${b.title}: ${b.borrow_count} ta"></div>
            </div>
            <div class="chart-label">${name}</div>
          </div>`;
        }).join("")}</div>
        <div style="text-align:center;font-size:12px;color:#64748B;margin-top:8px">Ijara soni</div>`
      : `<p style="color:#64748B;text-align:center;padding:32px">Ma'lumot yo'q</p>`;

    // Top readers
    const rdrs = Array.isArray(readers) ? readers.slice(0,6) : [];
    const rankColors = ["#F59E0B","#94A3B8","#CD7F32"];
    document.getElementById("topReaders").innerHTML = rdrs.length
      ? rdrs.map((r,i)=>`
          <div class="reader-row">
            <div class="reader-rank" style="background:${rankColors[i]||'#F1F5F9'};color:${i<3?'#fff':'#64748B'}">${i+1}</div>
            <div class="reader-name">${r.full_name||"—"}</div>
            <div class="reader-count">${r.total_books} ta</div>
          </div>`).join("")
      : `<p style="color:#64748B;text-align:center">Ma'lumot yo'q</p>`;
  } catch(e) { console.error(e); }
}

// ══════════════════════════════════════════
//  BOOKS
// ══════════════════════════════════════════
let booksState = { page:0, search:"", cats:[], authors:[] };

async function renderBooks(p=0) {
  booksState.page = p;
  setContent(`
    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input placeholder="Kitob nomi, muallif..." id="bookSearch" value="${booksState.search}" oninput="booksState.search=this.value" onkeydown="if(event.key==='Enter')renderBooks(0)"/>
      </div>
      <button class="btn btn-primary" onclick="bookAddModal()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Kitob qo'shish
      </button>
    </div>
    <div class="count-label" id="booksCount"></div>
    <div id="booksTable">${spinner()}</div>
  `);

  // Load cats & authors for forms
  if (!booksState.cats.length) {
    try {
      const [c,a] = await Promise.all([api("GET","/api/category?size=200"),api("GET","/api/writer?size=200")]);
      booksState.cats    = c.content||[];
      booksState.authors = a.content||[];
    } catch(e){}
  }

  try {
    const q = `/api/books?page=${p}&size=10${booksState.search?`&search=${encodeURIComponent(booksState.search)}`:""}`;
    const d = await api("GET", q);
    const books = d.content||[];
    document.getElementById("booksCount").innerHTML = `Jami: <b>${d.total_elements||0}</b> ta kitob`;

    document.getElementById("booksTable").innerHTML = `
      <div class="table-wrap">
        <div class="table-scroll">
          <table>
            <thead><tr><th>Kitob nomi</th><th>Muallif</th><th>Kategoriya</th><th>Til</th><th>Nusxa</th><th>Amal</th></tr></thead>
            <tbody>${books.length ? books.map(b=>`
              <tr>
                <td class="bold">${b.title||"—"}<br>${b.isbn?`<small style="color:#94A3B8">#${b.isbn}</small>`:""}</td>
                <td>${b.author_name||"—"}</td>
                <td>${b.category_name||"—"}</td>
                <td>${b.language||"—"}</td>
                <td><b style="color:${b.available_copies>0?'#10B981':'#EF4444'}">${b.available_copies}</b><span style="color:#CBD5E1"> / </span>${b.total_copies}</td>
                <td>
                  <div style="display:flex;gap:5px">
                    <button class="act-btn act-green" onclick='bookCopiesModal(${JSON.stringify(b)})' title="Nusxalar">
                      <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                    <button class="act-btn act-blue" onclick='bookEditModal(${JSON.stringify(b)})' title="Tahrirlash">
                      <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                    <button class="act-btn act-red" onclick="deleteBook(${b.id})" title="O'chirish">
                      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                    </button>
                  </div>
                </td>
              </tr>`).join("") : `<tr class="empty-row"><td colspan="6">📭 Kitob topilmadi</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
      ${pagerHtml(p, d.total_pages||0, "renderBooks")}`;
  } catch(e) { document.getElementById("booksTable").innerHTML=`<p style="padding:32px;color:#EF4444">Xatolik: ${e?.message||""}</p>`; }
}

function bookFormHtml(b={}) {
  const catOpts = booksState.cats.map(c=>`<option value="${c.id}" ${b.category_id==c.id?"selected":""}>${c.name}</option>`).join("");
  const authOpts = booksState.authors.map(a=>`<option value="${a.id}" ${b.author_id==a.id?"selected":""}>${a.full_name}</option>`).join("");
  return `
    <div class="err-box" id="bookErr"></div>
    <div class="form-grid">
      <div class="field"><label>Kitob nomi *</label><input id="bTitle" value="${b.title||""}" placeholder="O'tkan kunlar"/></div>
      <div class="field"><label>Til *</label><input id="bLang" value="${b.language||""}" placeholder="O'zbekcha"/></div>
      <div class="field"><label>Muallif</label><select id="bAuthor"><option value="">— Tanlang —</option>${authOpts}</select></div>
      <div class="field"><label>Kategoriya</label><select id="bCat"><option value="">— Tanlang —</option>${catOpts}</select></div>
      <div class="field"><label>ISBN</label><input id="bIsbn" value="${b.isbn||""}" placeholder="ISBN"/></div>
      <div class="field"><label>Nashr yili</label><input type="number" id="bYear" value="${b.publish_year||""}" placeholder="2024"/></div>
    </div>
    <div class="field"><label>Muqova URL</label><input id="bImg" value="${b.image_url||""}" placeholder="https://..."/></div>
    <div class="field"><label>Tavsif *</label><textarea id="bDesc" placeholder="Kitob haqida...">${b.description||""}</textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Bekor</button>
      <button class="btn btn-primary" id="bookSaveBtn" onclick="saveBook(${b.id||0})">
        ${b.id ? "Saqlash" : "Qo'shish"}
      </button>
    </div>`;
}

function bookAddModal()        { openModal("Yangi kitob qo'shish", bookFormHtml(), true); }
function bookEditModal(b)      { openModal("Kitobni tahrirlash",   bookFormHtml(b), true); }

async function saveBook(id) {
  const err = document.getElementById("bookErr");
  const t=document.getElementById("bTitle").value.trim();
  const l=document.getElementById("bLang").value.trim();
  const d=document.getElementById("bDesc").value.trim();
  if (!t||!l||!d) { showErr(err,"Nom, tavsif va til majburiy"); return; }
  const btn = document.getElementById("bookSaveBtn");
  btn.textContent="Saqlanmoqda..."; btn.disabled=true;
  const body = {
    title:t, language:l, description:d,
    isbn:document.getElementById("bIsbn").value,
    publish_year:Number(document.getElementById("bYear").value)||null,
    image_url:document.getElementById("bImg").value,
    category_id:Number(document.getElementById("bCat").value)||null,
    author_id:Number(document.getElementById("bAuthor").value)||null,
  };
  try {
    id ? await api("PATCH",`/api/books/${id}`,body) : await api("POST","/api/books",body);
    closeModal(); renderBooks(booksState.page);
  } catch(e){ showErr(err,e?.message||"Xatolik"); btn.textContent=id?"Saqlash":"Qo'shish"; btn.disabled=false; }
}

async function deleteBook(id) {
  if (!confirm("Kitobni o'chirishni tasdiqlaysizmi?")) return;
  try { await api("DELETE",`/api/books/${id}`); renderBooks(booksState.page); }
  catch(e){ alert(e?.message||"Xatolik"); }
}

async function bookCopiesModal(b) {
  openModal(`"${b.title}" — Nusxalar`,`<div id="copiesContent">${spinner()}</div>`, true);
  try {
    const d = await api("GET",`/api/books/${b.id}/book-copies`);
    const copies = Array.isArray(d)?d:[];
    const CS = {AVAILABLE:{bg:"#D1FAE5",c:"#065F46"},RESERVED:{bg:"#DBEAFE",c:"#1D4ED8"},BORROWED:{bg:"#FEF3C7",c:"#92400E"},LOST:{bg:"#FEE2E2",c:"#991B1B"},DAMAGED:{bg:"#F3E8FF",c:"#6B21A8"}};
    document.getElementById("copiesContent").innerHTML = `
      <div class="copies-toolbar">
        <span>Nusxa qo'shish:</span>
        <input type="number" min="1" id="copyCount" value="1"/>
        <button class="btn btn-primary btn-sm" onclick="addCopies(${b.id})">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Qo'shish
        </button>
        <span class="copies-count">Jami: ${copies.length} ta nusxa</span>
      </div>
      <div class="table-scroll" style="max-height:300px;overflow-y:auto">
        <table>
          <thead><tr><th>Inventar kodi</th><th>Holati</th><th>Faol</th></tr></thead>
          <tbody>${copies.length?copies.map(c=>{
            const cs=CS[c.status]||{bg:"#F1F5F9",c:"#64748B"};
            return `<tr>
              <td class="bold sm">${c.inventory_code||"—"}</td>
              <td><span class="badge" style="background:${cs.bg};color:${cs.c}">${c.status}</span></td>
              <td>${c.is_active?"✅ Ha":"❌ Yo'q"}</td>
            </tr>`;}).join(""):`<tr class="empty-row"><td colspan="3">Nusxa yo'q</td></tr>`}
          </tbody>
        </table>
      </div>`;
  } catch(e){ document.getElementById("copiesContent").innerHTML=`<p style="color:#EF4444">Xatolik</p>`; }
}

async function addCopies(bookId) {
  const n = Number(document.getElementById("copyCount").value)||1;
  try { await api("POST",`/api/books/${bookId}/add-copies`,{count:n}); bookCopiesModal({id:bookId,title:""}); renderBooks(booksState.page); }
  catch(e){ alert(e?.message||"Xatolik"); }
}

// ══════════════════════════════════════════
//  AUTHORS
// ══════════════════════════════════════════
let authState = { page:0, search:"" };

async function renderAuthors(p=0) {
  authState.page = p;
  setContent(`
    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input placeholder="Muallif qidirish..." id="authSearch" value="${authState.search}" oninput="authState.search=this.value" onkeydown="if(event.key==='Enter')renderAuthors(0)"/>
      </div>
      <button class="btn btn-primary" onclick="authorModal()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Muallif qo'shish
      </button>
    </div>
    <div class="count-label" id="authCount"></div>
    <div id="authTable">${spinner()}</div>
  `);
  try {
    const q = `/api/writer?page=${p}&size=10${authState.search?`&search=${encodeURIComponent(authState.search)}`:""}`;
    const d = await api("GET", q);
    const list = d.content||[];
    document.getElementById("authCount").innerHTML = `Jami: <b>${d.total_elements||0}</b> ta muallif`;
    document.getElementById("authTable").innerHTML = `
      <div class="table-wrap"><div class="table-scroll">
        <table>
          <thead><tr><th>#</th><th>To'liq ismi</th><th>Qo'shilgan</th><th>Amal</th></tr></thead>
          <tbody>${list.length?list.map((a,i)=>`
            <tr>
              <td style="color:#94A3B8">${p*10+i+1}</td>
              <td class="bold">✍️ ${a.full_name}</td>
              <td class="sm">${(a.created_at||"").split(" ")[0]||"—"}</td>
              <td>
                <div style="display:flex;gap:6px">
                  <button class="act-btn act-blue" onclick='authorModal(${JSON.stringify(a)})'>
                    <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  </button>
                  <button class="act-btn act-red" onclick="deleteAuthor(${a.id})">
                    <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                  </button>
                </div>
              </td>
            </tr>`).join(""):`<tr class="empty-row"><td colspan="4">Muallif topilmadi</td></tr>`}
          </tbody>
        </table>
      </div></div>
      ${pagerHtml(p, d.total_pages||0, "renderAuthors")}`;
  } catch(e){ document.getElementById("authTable").innerHTML=`<p style="padding:32px;color:#EF4444">Xatolik</p>`; }
}

function authorModal(a={}) {
  openModal(a.id?"Muallifni tahrirlash":"Yangi muallif", `
    <div class="err-box" id="authErr"></div>
    <div class="field"><label>To'liq ismi *</label><input id="authName" value="${a.full_name||""}" placeholder="Abdulla Qodiriy"/></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Bekor</button>
      <button class="btn btn-primary" id="authSaveBtn" onclick="saveAuthor(${a.id||0})">${a.id?"Saqlash":"Qo'shish"}</button>
    </div>`);
}

async function saveAuthor(id) {
  const name = document.getElementById("authName").value.trim();
  const err  = document.getElementById("authErr");
  if (!name) { showErr(err,"Ism kiriting"); return; }
  const btn = document.getElementById("authSaveBtn");
  btn.textContent="..."; btn.disabled=true;
  try {
    id ? await api("PATCH",`/api/writer/${id}`,{full_name:name}) : await api("POST","/api/writer",{full_name:name});
    closeModal(); renderAuthors(authState.page);
    // Reset cats/authors cache
    booksState.cats=[]; booksState.authors=[];
  } catch(e){ showErr(err,e?.message||"Xatolik"); btn.textContent=id?"Saqlash":"Qo'shish"; btn.disabled=false; }
}

async function deleteAuthor(id) {
  if (!confirm("Muallifni o'chirishni tasdiqlaysizmi?")) return;
  try { await api("DELETE",`/api/writer/${id}`); renderAuthors(authState.page); }
  catch(e){ alert(e?.message||"Xatolik"); }
}

// ══════════════════════════════════════════
//  CATEGORIES
// ══════════════════════════════════════════
let catState = { page:0, search:"" };
const CAT_COLORS = ["#3B82F6","#10B981","#F59E0B","#EF4444","#8B5CF6","#06B6D4","#EC4899","#84CC16"];

async function renderCategories(p=0) {
  catState.page = p;
  setContent(`
    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input placeholder="Kategoriya qidirish..." id="catSearch" value="${catState.search}" oninput="catState.search=this.value" onkeydown="if(event.key==='Enter')renderCategories(0)"/>
      </div>
      <button class="btn btn-primary" onclick="categoryModal()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Kategoriya qo'shish
      </button>
    </div>
    <div class="count-label" id="catCount"></div>
    <div id="catGrid">${spinner()}</div>
  `);
  try {
    const q = `/api/category?page=${p}&size=12${catState.search?`&search=${encodeURIComponent(catState.search)}`:""}`;
    const d = await api("GET", q);
    const cats = d.content||[];
    document.getElementById("catCount").innerHTML = `Jami: <b>${d.total_elements||0}</b> ta kategoriya`;
    document.getElementById("catGrid").innerHTML = cats.length
      ? `<div class="cat-grid">${cats.map((c,i)=>{
          const cc=CAT_COLORS[i%CAT_COLORS.length];
          return `<div class="cat-card" style="border-top:4px solid ${cc}">
            <div class="cat-head">
              <div class="cat-name"><span style="color:${cc}">■</span> ${c.name}</div>
              <div class="cat-actions">
                <button class="act-btn act-blue" onclick='categoryModal(${JSON.stringify(c)})'>
                  <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="act-btn act-red" onclick="deleteCategory(${c.id})">
                  <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                </button>
              </div>
            </div>
            <div class="cat-desc">${c.description||"Tavsif kiritilmagan"}</div>
          </div>`;}).join("")}
        </div>${pagerHtml(p, d.total_pages||0, "renderCategories")}`
      : `<p style="text-align:center;padding:48px;color:#64748B">Kategoriya topilmadi</p>`;
  } catch(e){ document.getElementById("catGrid").innerHTML=`<p style="padding:32px;color:#EF4444">Xatolik</p>`; }
}

function categoryModal(c={}) {
  openModal(c.id?"Kategoriyani tahrirlash":"Yangi kategoriya", `
    <div class="err-box" id="catErr"></div>
    <div class="field"><label>Nomi *</label><input id="catName" value="${c.name||""}" placeholder="Ilmiy fantastika"/></div>
    <div class="field"><label>Tavsif</label><textarea id="catDesc" placeholder="Kategoriya haqida...">${c.description||""}</textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Bekor</button>
      <button class="btn btn-primary" id="catSaveBtn" onclick="saveCategory(${c.id||0})">${c.id?"Saqlash":"Qo'shish"}</button>
    </div>`);
}

async function saveCategory(id) {
  const name = document.getElementById("catName").value.trim();
  const desc = document.getElementById("catDesc").value.trim();
  const err  = document.getElementById("catErr");
  if (!name) { showErr(err,"Nom kiriting"); return; }
  const btn = document.getElementById("catSaveBtn");
  btn.textContent="..."; btn.disabled=true;
  try {
    id ? await api("PATCH",`/api/category/${id}`,{name,description:desc}) : await api("POST","/api/category",{name,description:desc});
    closeModal(); renderCategories(catState.page);
    booksState.cats=[];
  } catch(e){ showErr(err,e?.message||"Xatolik"); btn.textContent=id?"Saqlash":"Qo'shish"; btn.disabled=false; }
}

async function deleteCategory(id) {
  if (!confirm("Kategoriyani o'chirishni tasdiqlaysizmi?")) return;
  try { await api("DELETE",`/api/category/${id}`); renderCategories(catState.page); }
  catch(e){ alert(e?.message||"Xatolik"); }
}

// ══════════════════════════════════════════
//  BORROWS
// ══════════════════════════════════════════
let borrowState = { page:0, search:"", status:"" };

async function renderBorrows(p=0) {
  borrowState.page = p;
  const statusOpts = Object.entries(BORROW_MAP).map(([k,v])=>`<option value="${k}" ${borrowState.status===k?"selected":""}>${v.t}</option>`).join("");
  setContent(`
    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input placeholder="Kitob yoki foydalanuvchi..." id="borSearch" value="${borrowState.search}" oninput="borrowState.search=this.value" onkeydown="if(event.key==='Enter')renderBorrows(0)"/>
      </div>
      <select class="filter-select" id="borStatus" onchange="borrowState.status=this.value;renderBorrows(0)">
        <option value="">Barcha statuslar</option>${statusOpts}
      </select>
      <button class="btn btn-primary" onclick="borrowModal()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Bron qilish
      </button>
    </div>
    <div class="count-label" id="borCount"></div>
    <div id="borTable">${spinner()}</div>
  `);
  try {
    let q=`/api/borrow?page=${p}&size=10`;
    if(borrowState.search) q+=`&search=${encodeURIComponent(borrowState.search)}`;
    if(borrowState.status) q+=`&status=${borrowState.status}`;
    const d = await api("GET",q);
    const rows = d.content||[];
    document.getElementById("borCount").innerHTML = `Jami: <b>${d.total_elements||0}</b> ta yozuv`;
    document.getElementById("borTable").innerHTML = `
      <div class="table-wrap"><div class="table-scroll">
        <table>
          <thead><tr><th>#</th><th>Kitob</th><th>O'quvchi</th><th>Inv. Kodi</th><th>Muddat</th><th>Status</th><th>Amal</th></tr></thead>
          <tbody>${rows.length?rows.map(b=>{
            const sv=BORROW_MAP[b.status]||{bg:"#F1F5F9",c:"#64748B",t:b.status};
            const od=b.status==="OVERDUE";
            return `<tr style="${od?"background:#FFF5F5":""}">
              <td class="sm" style="color:#94A3B8">${b.id}</td>
              <td class="bold">${b.book_title||"—"}</td>
              <td>${b.user_full_name||`#${b.user_id}`}</td>
              <td class="sm">${b.inventory_code||"—"}</td>
              <td class="sm${od?" danger-text":""}">${b.due_date||"—"}</td>
              <td><span class="badge" style="background:${sv.bg};color:${sv.c}">${sv.t}</span></td>
              <td>
                <div style="display:flex;gap:5px">
                  ${b.status==="RESERVED"?`<button class="btn btn-success btn-sm" onclick="confirmPickup(${b.id})">✓ Oldi</button>`:""}
                  ${b.status==="BORROWED"?`<button class="btn btn-primary btn-sm" onclick="returnBook(${b.id})">⮐ Qaytarish</button>`:""}
                  ${["RESERVED","BORROWED","OVERDUE"].includes(b.status)?`<button class="btn btn-danger btn-sm" onclick="cancelBorrow(${b.id})">✕</button>`:""}
                  ${["RETURNED","RESERVED_CANCELLED","FORCE_CANCELLED"].includes(b.status)?`<span style="color:#CBD5E1;font-size:12px">—</span>`:""}
                </div>
              </td>
            </tr>`;}).join(""):`<tr class="empty-row"><td colspan="7">📭 Ijara topilmadi</td></tr>`}
          </tbody>
        </table>
      </div></div>
      ${pagerHtml(p, d.total_pages||0, "renderBorrows")}`;
  } catch(e){ document.getElementById("borTable").innerHTML=`<p style="padding:32px;color:#EF4444">Xatolik</p>`; }
}

function borrowModal() {
  openModal("Kitob bron qilish",`
    <div class="err-box" id="borErr"></div>
    <div class="field"><label>Kitob ID *</label><input type="number" id="borBookId" placeholder="Masalan: 12"/></div>
    <div class="info-box">💡 Kitob IDni Kitoblar sahifasidan topishingiz mumkin</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Bekor</button>
      <button class="btn btn-primary" id="borSaveBtn" onclick="createBorrow()">Bron qilish</button>
    </div>`);
}

async function createBorrow() {
  const id=Number(document.getElementById("borBookId").value);
  const err=document.getElementById("borErr");
  if (!id) { showErr(err,"Kitob ID kiriting"); return; }
  const btn=document.getElementById("borSaveBtn"); btn.textContent="..."; btn.disabled=true;
  try { await api("POST","/api/borrow",{book_id:id}); closeModal(); renderBorrows(0); }
  catch(e){ showErr(err,e?.message||"Xatolik"); btn.textContent="Bron qilish"; btn.disabled=false; }
}

async function confirmPickup(id) {
  try { await api("POST",`/api/borrow/${id}/confirm-pickup`); renderBorrows(borrowState.page); }
  catch(e){ alert(e?.message||"Xatolik"); }
}
async function returnBook(id) {
  if (!confirm("Kitob qaytarilganini tasdiqlaysizmi?")) return;
  try { await api("PATCH",`/api/borrow/${id}/return`); renderBorrows(borrowState.page); }
  catch(e){ alert(e?.message||"Xatolik"); }
}
async function cancelBorrow(id) {
  if (!confirm("Ijarani bekor qilishni tasdiqlaysizmi?")) return;
  try { await api("PATCH",`/api/borrow/admin/${id}/cancel`); renderBorrows(borrowState.page); }
  catch(e){ alert(e?.message||"Xatolik"); }
}

// ══════════════════════════════════════════
//  USERS
// ══════════════════════════════════════════
let userState = { search:"", status:"", role:"" };

async function renderUsers() {
  const statOpts = ["ACTIVE","UNVERIFIED","BLOCKED"].map(s=>`<option value="${s}" ${userState.status===s?"selected":""}>${s}</option>`).join("");
  const roleOpts = ["USER","ADMIN","SUPER_USER"].map(r=>`<option value="${r}" ${userState.role===r?"selected":""}>${r}</option>`).join("");
  setContent(`
    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input placeholder="Ism yoki email..." id="userSearch" value="${userState.search}" oninput="userState.search=this.value" onkeydown="if(event.key==='Enter')renderUsers()"/>
      </div>
      <select class="filter-select" onchange="userState.status=this.value;renderUsers()">
        <option value="">Barcha statuslar</option>${statOpts}
      </select>
      <select class="filter-select" onchange="userState.role=this.value;renderUsers()">
        <option value="">Barcha rollar</option>${roleOpts}
      </select>
    </div>
    <div id="userTable">${spinner()}</div>
  `);
  try {
    let q="?";
    if(userState.search) q+=`search=${encodeURIComponent(userState.search)}&`;
    if(userState.status) q+=`status=${userState.status}&`;
    if(userState.role)   q+=`role=${userState.role}&`;
    const d = await api("GET",`/api/users${q}`);
    const users = Array.isArray(d)?d:(d.content||[]);
    document.getElementById("userTable").innerHTML = `
      <div class="table-wrap"><div class="table-scroll">
        <table>
          <thead><tr><th>#</th><th>Ism</th><th>Email</th><th>Status</th><th>Rol</th><th>Amal</th></tr></thead>
          <tbody>${users.length?users.map(u=>`
            <tr>
              <td style="color:#94A3B8">${u.id}</td>
              <td>
                <div style="display:flex;align-items:center;gap:10px">
                  <div class="user-ava">${((u.first_name||"?")[0]).toUpperCase()}</div>
                  <b style="color:#0F172A">${u.first_name||""} ${u.last_name||""}</b>
                </div>
              </td>
              <td class="sm">${u.email||"—"}</td>
              <td>${badge(u.status)}</td>
              <td>${badge(u.role)}</td>
              <td>
                <button class="btn btn-ghost btn-sm" onclick='roleModal(${JSON.stringify({id:u.id,name:`${u.first_name} ${u.last_name}`,role:u.role})})'>
                  Rol o'zgartirish
                </button>
              </td>
            </tr>`).join(""):`<tr class="empty-row"><td colspan="6">Foydalanuvchi topilmadi</td></tr>`}
          </tbody>
        </table>
      </div></div>`;
  } catch(e){ document.getElementById("userTable").innerHTML=`<p style="padding:32px;color:#EF4444">Xatolik</p>`; }
}

function roleModal(u) {
  const opts = ["USER","ADMIN","SUPER_USER"].map(r=>`<option value="${r}" ${u.role===r?"selected":""}>${r}</option>`).join("");
  openModal("Rol o'zgartirish",`
    <p style="font-size:14px;color:#64748B;margin-bottom:14px"><b style="color:#0F172A">${u.name}</b> uchun yangi rol:</p>
    <div class="field"><select id="newRole">${opts}</select></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Bekor</button>
      <button class="btn btn-primary" onclick="saveRole(${u.id})">Saqlash</button>
    </div>`);
}

async function saveRole(userId) {
  const role = document.getElementById("newRole").value;
  try { await api("PATCH",`/api/users/role?role=${role}&userId=${userId}`); closeModal(); renderUsers(); }
  catch(e){ alert(e?.message||"Xatolik"); }
}
</script>
